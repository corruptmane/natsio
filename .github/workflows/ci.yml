name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# All check/test/build commands live in the justfile — CI only does
# environment setup, then runs the same recipes developers run locally.
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - uses: extractions/setup-just@v3
      - run: uv sync --locked
      - run: just check

  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python: ["3.13", "3.14"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: ${{ matrix.python }}
      - uses: extractions/setup-just@v3
      - run: uv sync --locked
      # Integration tests skip themselves when no nats-server binary is
      # present; the dedicated job below runs them against a real server.
      - run: just test -q

  integration:
    runs-on: ubuntu-latest
    env:
      NATS_SERVER_VERSION: v2.14.3
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - uses: extractions/setup-just@v3
      - name: Install nats-server
        run: |
          curl -sfL "https://github.com/nats-io/nats-server/releases/download/${NATS_SERVER_VERSION}/nats-server-${NATS_SERVER_VERSION}-linux-amd64.tar.gz" \
            | tar -xz --strip-components=1 -C /usr/local/bin --wildcards '*/nats-server'
          nats-server --version
      - run: uv sync --locked
      - run: just integration -q

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - uses: extractions/setup-just@v3
      - run: just build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
