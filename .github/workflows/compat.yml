name: Server compatibility

# Early-warning radar, not a merge gate: the pinned server version in ci.yml
# decides what we *support*; this tracks what's *coming*. A failure here means
# an upstream nats-server change broke us before any user hit it.
#
# On failure the `report` job opens (or updates) a GitHub issue that embeds the
# tested server version and the pytest failure tail, so investigating needs only
# the issue URL — no digging through Actions logs. The issue auto-closes when the
# job goes green again.
#
# Each job caches a marker keyed on (this repo's commit SHA, the resolved
# nats-server version). A daily run whose commit and server version are both
# unchanged from a previous PASS restores the marker and skips the build + test
# work entirely. Only a pass is cached, so a failure always re-runs until it is
# either fixed or the inputs change.

on:
  schedule:
    - cron: "17 6 * * *" # daily, 06:17 UTC (off the top-of-hour rush)
  workflow_dispatch:

jobs:
  latest-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - uses: extractions/setup-just@v3
      - name: Resolve latest released nats-server
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p radar
          # Authenticated gh, not anonymous api.github.com: the anon endpoint is
          # rate-limited to 60 req/hour per IP and returns an empty body on
          # shared runners, which left the tag blank and fed a malformed URL to
          # tar (a cryptic failure that opened a radar issue crying wolf).
          TAG=$(gh api repos/nats-io/nats-server/releases/latest --jq .tag_name)
          if [ -z "${TAG}" ] || [ "${TAG}" = "null" ]; then
            echo "could not resolve the latest nats-server release tag (GitHub API problem, not a natsio break)" >&2
            exit 1
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          # Named up front so a failed download still identifies the server.
          echo "nats-server ${TAG} (latest release)" > radar/version.txt
      - name: Skip if this commit already passed against this server
        id: cache
        uses: actions/cache/restore@v4
        with:
          path: radar-marker
          key: radar-latest-${{ github.sha }}-${{ steps.resolve.outputs.tag }}
      - name: Install nats-server
        if: success() && steps.cache.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          TAG='${{ steps.resolve.outputs.tag }}'
          curl -sfL "https://github.com/nats-io/nats-server/releases/download/${TAG}/nats-server-${TAG}-linux-amd64.tar.gz" \
            | tar -xz --strip-components=1 -C /usr/local/bin --wildcards '*/nats-server'
          nats-server --version | tee radar/version.txt
      - name: Sync
        if: success() && steps.cache.outputs.cache-hit != 'true'
        run: uv sync --locked
      - name: Integration tests
        if: success() && steps.cache.outputs.cache-hit != 'true'
        run: |
          set -o pipefail
          just integration -q --tb=short -rf 2>&1 | tee radar/integration.log
      - name: Record the pass
        if: success() && steps.cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p radar-marker
          echo "${{ github.sha }} vs ${{ steps.resolve.outputs.tag }}: passed" > radar-marker/ok
      - name: Save the pass marker
        if: success() && steps.cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: radar-marker
          key: radar-latest-${{ github.sha }}-${{ steps.resolve.outputs.tag }}
      - name: Upload radar log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: radar-latest-release
          path: radar/
          if-no-files-found: ignore

  server-main:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - uses: extractions/setup-just@v3
      - name: Resolve nats-server main commit
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p radar
          # The version string a main build reports is not unique across commits,
          # so key the cache on the actual main commit SHA and pin the build to it.
          SHA=$(gh api repos/nats-io/nats-server/commits/main --jq .sha)
          if [ -z "${SHA}" ] || [ "${SHA}" = "null" ]; then
            echo "could not resolve the nats-server main commit (GitHub API problem, not a natsio break)" >&2
            exit 1
          fi
          echo "sha=${SHA}" >> "$GITHUB_OUTPUT"
          echo "nats-server main @ ${SHA:0:12}" > radar/version.txt
      - name: Skip if this commit already passed against this server
        id: cache
        uses: actions/cache/restore@v4
        with:
          path: radar-marker
          key: radar-main-${{ github.sha }}-${{ steps.resolve.outputs.sha }}
      - uses: actions/setup-go@v5
        if: success() && steps.cache.outputs.cache-hit != 'true'
        with:
          go-version: stable
      - name: Build nats-server from main
        if: success() && steps.cache.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          go install "github.com/nats-io/nats-server/v2@${{ steps.resolve.outputs.sha }}"
          sudo cp "$(go env GOPATH)/bin/nats-server" /usr/local/bin/
          nats-server --version | tee radar/version.txt
      - name: Sync
        if: success() && steps.cache.outputs.cache-hit != 'true'
        run: uv sync --locked
      - name: Integration tests
        if: success() && steps.cache.outputs.cache-hit != 'true'
        run: |
          set -o pipefail
          just integration -q --tb=short -rf 2>&1 | tee radar/integration.log
      - name: Record the pass
        if: success() && steps.cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p radar-marker
          echo "${{ github.sha }} vs main ${{ steps.resolve.outputs.sha }}: passed" > radar-marker/ok
      - name: Save the pass marker
        if: success() && steps.cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: radar-marker
          key: radar-main-${{ github.sha }}-${{ steps.resolve.outputs.sha }}
      - name: Upload radar log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: radar-server-main
          path: radar/
          if-no-files-found: ignore

  # Turn a red radar into an actionable issue (and close it on recovery). Runs
  # regardless of the test jobs' outcome so it can both open and close.
  report:
    needs: [latest-release, server-main]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      issues: write
      actions: read
    steps:
      - name: Download radar logs
        uses: actions/download-artifact@v4
        with:
          path: artifacts
        continue-on-error: true # no artifacts when a job died before uploading
      - name: File or resolve the radar issue
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const LABEL = 'compat-radar';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const flavors = [
              {
                job: 'latest-release',
                result: '${{ needs.latest-release.result }}',
                title: 'Compat radar: latest released nats-server is failing',
                blurb: 'the **latest released** nats-server — a shipped version already broke us',
              },
              {
                job: 'server-main',
                result: '${{ needs.server-main.result }}',
                title: 'Compat radar: nats-server `main` is failing',
                blurb: 'nats-server built from **`main`** — an upstream change in flight',
              },
            ];

            // Make sure the label exists (ignore "already created" races).
            try {
              await github.rest.issues.getLabel({ ...context.repo, name: LABEL });
            } catch {
              try {
                await github.rest.issues.createLabel({
                  ...context.repo, name: LABEL, color: 'b60205',
                  description: 'nats-server compatibility radar failures',
                });
              } catch {}
            }

            const open = await github.paginate(github.rest.issues.listForRepo, {
              ...context.repo, state: 'open', labels: LABEL, per_page: 100,
            });

            const read = (p) => { try { return fs.readFileSync(p, 'utf8').trim(); } catch { return ''; } };
            const tail = (s, lines = 200, chars = 40000) =>
              s.split('\n').slice(-lines).join('\n').slice(-chars);

            for (const f of flavors) {
              const existing = open.find((i) => i.title === f.title);

              if (f.result === 'failure') {
                const dir = `artifacts/radar-${f.job}`;
                const version = read(`${dir}/version.txt`) || '(server version not captured)';
                const log = read(`${dir}/integration.log`);
                const logBlock = log
                  ? `<details><summary>Integration failure tail (\`--tb=short -rf\`)</summary>\n\n\`\`\`\n${tail(log)}\n\`\`\`\n\n</details>`
                  : '_No test log — the job failed before the tests ran (server build/install). See the run._';
                const body = [
                  `The compat radar failed against ${f.blurb}.`,
                  ``,
                  `- **Job:** \`${f.job}\``,
                  `- **Server:** \`${version}\``,
                  `- **Run:** ${runUrl}`,
                  ``,
                  logBlock,
                  ``,
                  `<sub>Opened automatically by \`.github/workflows/compat.yml\`. It updates on each failing run and closes itself when the job goes green.</sub>`,
                ].join('\n');

                if (existing) {
                  await github.rest.issues.createComment({
                    ...context.repo, issue_number: existing.number,
                    body: `### Still failing — ${new Date().toISOString().slice(0, 10)}\n\n${body}`,
                  });
                } else {
                  await github.rest.issues.create({
                    ...context.repo, title: f.title, labels: [LABEL], body,
                  });
                }
              } else if (f.result === 'success' && existing) {
                await github.rest.issues.createComment({
                  ...context.repo, issue_number: existing.number,
                  body: `Green again on ${runUrl} — closing.`,
                });
                await github.rest.issues.update({
                  ...context.repo, issue_number: existing.number, state: 'closed',
                  state_reason: 'completed',
                });
              }
            }
