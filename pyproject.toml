# Workspace root: shared tooling configuration only. The published packages
# live in the workspace members (natsio/, extensions/natsio-*, tools/*).

[tool.uv.workspace]
members = ["natsio", "extensions/natsio-*", "tools/natsio-*"]

[tool.uv.sources]
natsio = { workspace = true }
natsio-testing = { workspace = true }
natsio-bench = { workspace = true }
natsio-otel = { workspace = true }
natsio-kvcodec = { workspace = true }
natsio-counters = { workspace = true }
natsio-natscontext = { workspace = true }

[dependency-groups]
dev = [
    "natsio",
    "natsio-testing",
    "natsio-bench",
    "natsio-otel",
    "natsio-kvcodec",
    "natsio-counters",
    "natsio-natscontext",
    # asserting spans/metrics in natsio-otel's tests
    "opentelemetry-sdk>=1.20",
    # Ed25519 backends: both are exercised, and the official `nkeys` package is
    # used to differential-test our own NKey codec against the reference.
    "pynacl>=1.6.2",
    "cryptography>=49",
    "nkeys>=0.2.1",
    "pytest>=8.3",
    "pytest-asyncio>=1.0",
    "hypothesis>=6.100",
    "ruff>=0.12",
    "ty",
]
docs = [
    "mkdocs-material>=9.5",
    "mkdocstrings[python]>=0.27",
]

[tool.ruff]
target-version = "py313"
line-length = 120
src = ["natsio/src", "natsio/tests"]

[tool.ruff.lint]
select = [
    "E",      # pycodestyle errors
    "W",      # pycodestyle warnings
    "F",      # pyflakes
    "I",      # isort
    "N",      # pep8-naming
    "UP",     # pyupgrade
    "B",      # flake8-bugbear
    "C4",     # flake8-comprehensions
    "SIM",    # flake8-simplify
    "PIE",    # flake8-pie
    "RET",    # flake8-return
    "ASYNC",  # flake8-async
    "PERF",   # perflint
    "RUF",    # ruff-specific
]

[tool.ty.environment]
python-version = "3.13"
# Sibling `natsio.<ext>` imports in extension tests cannot be resolved by a
# type checker: core is a REGULAR package (pkgutil-hybrid namespace, see
# docs/decisions.md), so contributions from other src roots don't merge under
# static analysis. Extension tests carry `# ty: ignore[unresolved-import]` on
# their own-package import — the accepted cost of the namespace model.
extra-paths = ["natsio/tests"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
testpaths = ["natsio/tests", "extensions"]
