# Workspace root: shared tooling configuration only. The published packages
# live in the workspace members (natsio/, extensions/natsio-*, tools/*).

[tool.uv.workspace]
members = ["natsio", "extensions/natsio-*", "tools/natsio-*"]

[tool.uv.sources]
natsio = { workspace = true }
natsio-testing = { workspace = true }
natsio-bench = { workspace = true }
natsio-otel = { workspace = true }
natsio-kvcodec = { workspace = true }
natsio-counters = { workspace = true }
natsio-natscontext = { workspace = true }

[dependency-groups]
dev = [
    "natsio",
    "natsio-testing",
    "natsio-bench",
    "natsio-otel",
    "natsio-kvcodec",
    "natsio-counters",
    "natsio-natscontext",
    # asserting spans/metrics in natsio-otel's tests
    "opentelemetry-sdk>=1.20",
    # Ed25519 backends: both are exercised, and the official `nkeys` package is
    # used to differential-test our own NKey codec against the reference.
    "pynacl>=1.6.2",
    "cryptography>=49",
    "nkeys>=0.2.1",
    "pytest>=8.3",
    "pytest-asyncio>=1.0",
    "hypothesis>=6.100",
    "ruff>=0.12",
    "ty",
]
docs = [
    "mkdocs-material>=9.5",
    "mkdocstrings[python]>=0.27",
]

[tool.ruff]
target-version = "py313"
line-length = 120
src = ["natsio/src", "natsio/tests"]

[tool.ruff.lint]
select = [
    "E",      # pycodestyle errors
    "W",      # pycodestyle warnings
    "F",      # pyflakes
    "I",      # isort
    "N",      # pep8-naming
    "UP",     # pyupgrade
    "B",      # flake8-bugbear
    "C4",     # flake8-comprehensions
    "SIM",    # flake8-simplify
    "PIE",    # flake8-pie
    "RET",    # flake8-return
    "ASYNC",  # flake8-async
    "PERF",   # perflint
    "RUF",    # ruff-specific
    "G",      # flake8-logging-format
    "RSE",    # flake8-raise
    "DTZ",    # flake8-datetimez — no naive datetimes
    "PGH",    # pygrep-hooks — no blanket type:ignore / noqa
    "FURB",   # refurb — modernization
    "PLE",    # pylint errors
    "PLW",    # pylint warnings
    "PLC0415",  # import-outside-top-level — lazy imports must be justified (circular/optional)
    # flake8-type-checking, correctness codes only. NOT TC001-003 (they push
    # type-only imports INTO TYPE_CHECKING + quotes — we prefer concrete
    # imports, TYPE_CHECKING only for circular/forward-ref).
    "TC004",  # runtime-used import wrongly in a TYPE_CHECKING block
    "TC005",  # empty TYPE_CHECKING block
    "TC006",  # unquoted cast type
    "TC010",  # runtime string annotation that can't be evaluated
]
# The ignore list stays empty on purpose: every suppression is an inline,
# visible, justified noqa — never a blanket config rule.

[tool.ruff.lint.per-file-ignores]
# The one deliberate exception: function-level imports are fine in TESTS (local
# fixtures, scoped monkeypatch targets, per-case doubles) but banned in shipped
# source, where every remaining lazy import is a justified `# noqa: PLC0415`.
"**/tests/**" = ["PLC0415"]
"natsio/tests/**" = ["PLC0415"]
# Examples are teaching code — a conditional/lazy import (e.g. importing the
# dev-only natsio-testing extension only on the self-start path) is a feature
# to demonstrate, not a smell.
"examples/**" = ["PLC0415"]

[tool.ty.environment]
python-version = "3.13"
# Sibling `natsio.<ext>` imports in extension tests cannot be resolved by a
# type checker: core is a REGULAR package (pkgutil-hybrid namespace, see
# docs/decisions.md), so contributions from other src roots don't merge under
# static analysis. Extension tests carry `# ty: ignore[unresolved-import]` on
# their own-package import — the accepted cost of the namespace model.
extra-paths = ["natsio/tests"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
testpaths = ["natsio/tests", "extensions"]
